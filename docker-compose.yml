services:
  postgres:
    image: postgres:16-alpine
    container_name: enjaz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: enjaz_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - enjaz_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enjaz_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  enjaz_postgres_data:
